name: Publish to PyPI

# Publish when a GitHub Release is published. You can also trigger it manually.
on:
  release:
    types: [published]
  workflow_dispatch:

# Run JavaScript actions on Node 24 explicitly (silences the Node 20 deprecation
# warning until the actions update their own metadata).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --group dev pytest

      - name: Build sdist and wheel
        run: uv build

      - name: Upload built distributions
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Recommended: create a GitHub environment named "pypi" and reference it in
    # the PyPI trusted-publisher config. Remove this line to publish without one.
    environment: pypi
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't fail the job if a file for this version is already on PyPI
          # (e.g. when a release workflow is re-run). Bump the version for a
          # real new release — PyPI never allows overwriting an existing one.
          skip-existing: true
